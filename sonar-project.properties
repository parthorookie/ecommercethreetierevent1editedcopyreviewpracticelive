sonar.projectKey=ecommerce-platform
sonar.projectName=E-Commerce Platform
sonar.projectVersion=1.0

# Sources
sonar.sources=app
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js,**/dist/**

# Test reporting
sonar.javascript.lcov.reportPaths=app/backend/coverage/lcov.info,app/worker/coverage/lcov.info


# Language
sonar.language=js

# Quality gate thresholds (configure in SonarQube UI)
# Conditions: coverage >= 70%, duplications < 3%, no new critical issues
