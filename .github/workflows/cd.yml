name: CD - Terraform Infra + ArgoCD GitOps on AWS EKS

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "helm/**"
      - "argo/**"
      - "k8s/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options: [plan, apply, destroy]

env:
  AWS_REGION:       ap-south-1
  TF_DIR:           terraform
  EKS_CLUSTER_NAME: ecommerce-eks
  GITHUB_REPO:      https://github.com/parthorookie/ecommercethreetierevent1editedcopyreviewpracticelive

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Terraform Plan
  # ═══════════════════════════════════════════════════════════════════════════
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Clean Terraform Cache
        run: |
           rm -rf .terraform
           rm -f .terraform.lock.hcl
          
      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=parth--aps1-az1--x-s3" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true" 

      - name: Reconcile Existing Resources (Skip Duplicates)
        working-directory: ${{ env.TF_DIR }}
        continue-on-error: true 
        run: |
          echo "Starting State Reconciliation..."
          
          # 1. Check & Import IAM Roles
          ROLES=("ecommerce-eks-cluster-role" "ecommerce-eks-node-role" "ecommerce-worker-task-execution-role" "ecommerce-worker-task-role" "ecommerce-rabbitmq-ec2-role")
          TF_PATHS=("module.eks.aws_iam_role.eks_cluster" "module.eks.aws_iam_role.eks_nodes" "module.fargate-profile.aws_iam_role.worker_task_execution" "module.fargate-profile.aws_iam_role.worker_task" "module.rabbitmq_ec2.aws_iam_role.rabbitmq_ec2")

          for i in "${!ROLES[@]}"; do
            if aws iam get-role --role-name "${ROLES[$i]}" >/dev/null 2>&1; then
              echo "Role ${ROLES[$i]} exists. Importing to ${TF_PATHS[$i]}..."
              terraform import -var="db_password=${{ secrets.DB_PASSWORD }}" -var="operator_ip_cidr=${{ secrets.OPERATOR_IP_CIDR }}" "${TF_PATHS[$i]}" "${ROLES[$i]}" || echo "Already managed."
            fi
          done

          # 2. Check & Import ECR
          REPOS=("ecommerce-backend" "ecommerce-worker" "ecommerce-frontend")
          TF_ECR=("module.ecr.aws_ecr_repository.backend" "module.ecr.aws_ecr_repository.worker" "module.ecr.aws_ecr_repository.frontend")

          for i in "${!REPOS[@]}"; do
            if aws ecr describe-repositories --repository-names "${REPOS[$i]}" >/dev/null 2>&1; then
              echo "ECR ${REPOS[$i]} exists. Importing..."
              terraform import -var="db_password=${{ secrets.DB_PASSWORD }}" -var="operator_ip_cidr=${{ secrets.OPERATOR_IP_CIDR }}" "${TF_ECR[$i]}" "${REPOS[$i]}" || echo "Already managed."
            fi
          done

          # 3. Check & Import Security Group
          ALB_SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=ecommerce-alb-sg" --query "SecurityGroups[0].GroupId" --output text)
          if [ "$ALB_SG_ID" != "None" ]; then
            echo "ALB SG exists ($ALB_SG_ID). Importing..."
            terraform import -var="db_password=${{ secrets.DB_PASSWORD }}" -var="operator_ip_cidr=${{ secrets.OPERATOR_IP_CIDR }}" module.alb_waf.aws_security_group.alb "$ALB_SG_ID" || echo "Already managed."
          fi



      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate
      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var="region=${{ env.AWS_REGION }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="project_name=ecommerce" \
            -var="environment=prod" \
            -var="operator_ip_cidr=${{ secrets.OPERATOR_IP_CIDR }}" \
            -out=tfplan -detailed-exitcode
        continue-on-error: true
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Terraform Apply
  # ═══════════════════════════════════════════════════════════════════════════
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && (github.event.inputs.action == 'apply' || github.event_name == 'push')
    environment: production
    outputs:
      eks_cluster_name:   ${{ steps.tf_out.outputs.eks_cluster_name }}
      rabbitmq_ip:        ${{ steps.tf_out.outputs.rabbitmq_ip }}
      rabbitmq_public_ip: ${{ steps.tf_out.outputs.rabbitmq_public_ip }}
      aurora_endpoint:    ${{ steps.tf_out.outputs.aurora_endpoint }}
      alb_dns_name:       ${{ steps.tf_out.outputs.alb_dns_name }}
      ecr_backend_url:    ${{ steps.tf_out.outputs.ecr_backend_url }}
      ecr_worker_url:     ${{ steps.tf_out.outputs.ecr_worker_url }}
      aws_account_id:     ${{ steps.tf_out.outputs.aws_account_id }}
      vpc_id:             ${{ steps.tf_out.outputs.vpc_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"
      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=parth--aps1-az1--x-s3" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"
      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}
      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan
      - name: Capture Terraform outputs
        id: tf_out
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "eks_cluster_name=$(terraform output -raw eks_cluster_name)"    >> $GITHUB_OUTPUT
          echo "rabbitmq_ip=$(terraform output -raw rabbitmq_private_ip)"      >> $GITHUB_OUTPUT
          echo "rabbitmq_public_ip=$(terraform output -raw rabbitmq_public_ip)" >> $GITHUB_OUTPUT
          echo "aurora_endpoint=$(terraform output -raw aurora_endpoint)"      >> $GITHUB_OUTPUT
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)"            >> $GITHUB_OUTPUT
          echo "ecr_backend_url=$(terraform output -raw ecr_backend_url)"      >> $GITHUB_OUTPUT
          echo "ecr_worker_url=$(terraform output -raw ecr_worker_url)"        >> $GITHUB_OUTPUT
          echo "aws_account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT
          echo "vpc_id=$(terraform output -raw vpc_id 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Install cluster tools: AWS LB Controller + ArgoCD + KEDA + Prometheus
  # ═══════════════════════════════════════════════════════════════════════════
  install-cluster-tools:
    name: Install ArgoCD + AWS LB Controller + KEDA + Prometheus
    runs-on: ubuntu-latest
    needs: terraform-apply
    outputs:
      argocd_url:      ${{ steps.argocd_lb.outputs.argocd_url }}
      argocd_password: ${{ steps.argocd_pass.outputs.password }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: azure/setup-kubectl@v3
      - uses: azure/setup-helm@v4
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ needs.terraform-apply.outputs.eks_cluster_name }}
          kubectl get nodes
          echo "EKS connected"
      - name: Create namespaces
        run: |
          for ns in argocd argo worker keda monitoring kube-system; do
            kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
          done
      - name: Add Helm repos
        run: |
          helm repo add argo                  https://argoproj.github.io/argo-helm
          helm repo add kedacore              https://kedacore.github.io/charts
          helm repo add prometheus-community  https://prometheus-community.github.io/helm-charts
          helm repo add eks                   https://aws.github.io/eks-charts
          helm repo update

      - name: Create IAM policy for AWS Load Balancer Controller
        run: |
          POLICY_NAME="AWSLoadBalancerControllerIAMPolicy"
          ACCOUNT_ID="${{ needs.terraform-apply.outputs.aws_account_id }}"
          curl -sSL -o /tmp/alb-iam-policy.json \
            https://raw.githubusercontent.com/kubernetes-sigs/aws-load-balancer-controller/v2.7.0/docs/install/iam_policy.json
          aws iam create-policy \
            --policy-name "$POLICY_NAME" \
            --policy-document file:///tmp/alb-iam-policy.json \
            2>/dev/null || echo "Policy already exists"
          NODE_ROLE=$(aws eks describe-nodegroup \
            --cluster-name ${{ needs.terraform-apply.outputs.eks_cluster_name }} \
            --nodegroup-name ecommerce-node-group \
            --query 'nodegroup.nodeRole' \
            --output text | awk -F'/' '{print $NF}')
          aws iam attach-role-policy \
            --role-name "$NODE_ROLE" \
            --policy-arn "arn:aws:iam::${ACCOUNT_ID}:policy/${POLICY_NAME}" \
            2>/dev/null || echo "Policy already attached"
          echo "IAM policy attached to node role: $NODE_ROLE"

      - name: Install AWS Load Balancer Controller
        run: |
          kubectl create serviceaccount aws-load-balancer-controller \
            -n kube-system --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=${{ needs.terraform-apply.outputs.eks_cluster_name }} \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set region=${{ env.AWS_REGION }} \
            --set vpcId=${{ needs.terraform-apply.outputs.vpc_id }} \
            --wait --timeout=300s
          echo "AWS Load Balancer Controller installed"
          kubectl get deployment aws-load-balancer-controller -n kube-system

      - name: Apply ALB Ingress resource
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ecommerce-ingress
            namespace: default
            annotations:
              kubernetes.io/ingress.class: alb
              alb.ingress.kubernetes.io/scheme: internet-facing
              alb.ingress.kubernetes.io/target-type: ip
              alb.ingress.kubernetes.io/load-balancer-name: ecommerce-alb
              alb.ingress.kubernetes.io/healthcheck-path: /health
              alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
              alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
              alb.ingress.kubernetes.io/healthy-threshold-count: "2"
              alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
          spec:
            rules:
              - http:
                  paths:
                    - path: /api
                      pathType: Prefix
                      backend:
                        service:
                          name: backend
                          port:
                            number: 3000
                    - path: /health
                      pathType: Exact
                      backend:
                        service:
                          name: backend
                          port:
                            number: 3000
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: frontend
                          port:
                            number: 80
          EOF
          echo "Ingress applied"

      - name: Install ArgoCD (LoadBalancer)
        run: |
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --version 6.7.3 \
            --set server.service.type=LoadBalancer \
            --set server.service.servicePortHttp=80 \
            --set server.extraArgs[0]="--insecure" \
            --set configs.params."server\.insecure"=true \
            --set "server.service.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-type"=nlb \
            --set "server.service.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-scheme"=internet-facing \
            --set "server.service.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-cross-zone-load-balancing-enabled"=true \
            --wait --timeout=300s
          kubectl rollout status deployment/argocd-server      -n argocd --timeout=180s
          kubectl rollout status deployment/argocd-repo-server -n argocd --timeout=180s
          echo "ArgoCD installed"

      - name: Get ArgoCD LoadBalancer hostname
        id: argocd_lb
        run: |
          for i in $(seq 1 24); do
            HOSTNAME=$(kubectl get svc argocd-server -n argocd \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$HOSTNAME" ] && [ "$HOSTNAME" != "null" ]; then
              echo "ArgoCD hostname: $HOSTNAME"
              echo "argocd_url=http://$HOSTNAME" >> $GITHUB_OUTPUT
              break
            fi
            echo "Attempt $i/24 — waiting 10s..."
            sleep 10
          done
          [ -z "$HOSTNAME" ] && kubectl describe svc argocd-server -n argocd && exit 1

      - name: Get ArgoCD admin password
        id: argocd_pass
        run: |
          PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)
          echo "password=$PASS" >> $GITHUB_OUTPUT

      - name: Install Argo Workflows (LoadBalancer)
        run: |
          helm upgrade --install argo-workflows argo/argo-workflows \
            --namespace argo \
            --set workflow.serviceAccount.create=true \
            --set server.authModes="{server}" \
            --set server.serviceType=LoadBalancer \
            --set "server.serviceAnnotations.service\.beta\.kubernetes\.io/aws-load-balancer-type"=nlb \
            --set "server.serviceAnnotations.service\.beta\.kubernetes\.io/aws-load-balancer-scheme"=internet-facing \
            --wait --timeout=300s

      - name: Install KEDA
        run: |
          helm upgrade --install keda kedacore/keda \
            --namespace keda --wait --timeout=300s

      - name: Install kube-prometheus-stack (Grafana on LoadBalancer)
        run: |
          helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --set grafana.adminPassword="${{ secrets.GRAFANA_PASSWORD }}" \
            --set grafana.service.type=LoadBalancer \
            --set "grafana.service.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-type"=nlb \
            --set "grafana.service.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-scheme"=internet-facing \
            --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
            --wait --timeout=600s

      - name: Print ArgoCD credentials
        run: |
          echo "ArgoCD URL  : ${{ steps.argocd_lb.outputs.argocd_url }}"
          echo "Username    : admin"
          echo "Password    : ${{ steps.argocd_pass.outputs.password }}"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 — Configure ArgoCD: register repo + create Applications
  # ═══════════════════════════════════════════════════════════════════════════
  configure-argocd:
    name: Configure ArgoCD (register repo + create apps)
    runs-on: ubuntu-latest
    needs: [terraform-apply, install-cluster-tools]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: azure/setup-kubectl@v3
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ needs.terraform-apply.outputs.eks_cluster_name }}
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Wait for ArgoCD UI to respond
        run: |
          URL="${{ needs.install-cluster-tools.outputs.argocd_url }}"
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 10 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "302" ]; then
              echo "ArgoCD UI responding (HTTP $STATUS)"; break
            fi
            echo "Attempt $i/20: HTTP $STATUS — waiting 15s..."
            sleep 15
          done

      - name: Login to ArgoCD
        run: |
          ARGOCD_HOST=$(echo "${{ needs.install-cluster-tools.outputs.argocd_url }}" | sed 's|http://||')
          argocd login "$ARGOCD_HOST" \
            --username admin \
            --password "${{ needs.install-cluster-tools.outputs.argocd_password }}" \
            --insecure --grpc-web

      - name: Register repo in ArgoCD
        run: |
          ARGOCD_HOST=$(echo "${{ needs.install-cluster-tools.outputs.argocd_url }}" | sed 's|http://||')
          argocd repo add ${{ env.GITHUB_REPO }} \
            --server "$ARGOCD_HOST" --insecure \
            --username parthorookie \
            --password "${{ secrets.GH_PAT }}" \
            --upsert

      - name: Create ArgoCD App — ecommerce-backend
        run: |
          ARGOCD_HOST=$(echo "${{ needs.install-cluster-tools.outputs.argocd_url }}" | sed 's|http://||')
          argocd app create ecommerce-backend \
            --server "$ARGOCD_HOST" --insecure \
            --repo "${{ env.GITHUB_REPO }}" \
            --path "helm/ecommerce" \
            --dest-server "https://kubernetes.default.svc" \
            --dest-namespace default \
            --revision HEAD \
            --sync-policy automated \
            --auto-prune \
            --self-heal \
            --helm-set "backend.image.repository=${{ needs.terraform-apply.outputs.ecr_backend_url }}" \
            --helm-set "frontend.image.repository=${{ needs.terraform-apply.outputs.ecr_backend_url }}" \
            --upsert

      - name: Create ArgoCD App — ecommerce-worker
        run: |
          ARGOCD_HOST=$(echo "${{ needs.install-cluster-tools.outputs.argocd_url }}" | sed 's|http://||')
          argocd app create ecommerce-worker \
            --server "$ARGOCD_HOST" --insecure \
            --repo "${{ env.GITHUB_REPO }}" \
            --path "helm/worker" \
            --dest-server "https://kubernetes.default.svc" \
            --dest-namespace worker \
            --revision HEAD \
            --sync-policy automated \
            --auto-prune \
            --self-heal \
            --helm-set "image.repository=${{ needs.terraform-apply.outputs.ecr_worker_url }}" \
            --upsert

      - name: Trigger initial sync
        run: |
          ARGOCD_HOST=$(echo "${{ needs.install-cluster-tools.outputs.argocd_url }}" | sed 's|http://||')
          argocd app sync ecommerce-backend --server "$ARGOCD_HOST" --insecure --async
          argocd app sync ecommerce-worker  --server "$ARGOCD_HOST" --insecure --async

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 5 — Secrets + KEDA + CronWorkflow
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-supporting-resources:
    name: Secrets + KEDA + Argo CronWorkflow
    runs-on: ubuntu-latest
    needs: [terraform-apply, configure-argocd]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: azure/setup-kubectl@v3
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ needs.terraform-apply.outputs.eks_cluster_name }}

      - name: Create app-secrets — default namespace
        run: |
          kubectl create secret generic app-secrets \
            --from-literal=db-host="${{ needs.terraform-apply.outputs.aurora_endpoint }}" \
            --from-literal=db-password="${{ secrets.DB_PASSWORD }}" \
            --from-literal=rabbit-url="amqp://admin:${{ secrets.RABBITMQ_PASSWORD }}@${{ needs.terraform-apply.outputs.rabbitmq_ip }}:5672" \
            --namespace default --dry-run=client -o yaml | kubectl apply -f -

      - name: Create app-secrets — worker namespace
        run: |
          kubectl create secret generic app-secrets \
            --from-literal=db-host="${{ needs.terraform-apply.outputs.aurora_endpoint }}" \
            --from-literal=db-password="${{ secrets.DB_PASSWORD }}" \
            --from-literal=rabbit-url="amqp://admin:${{ secrets.RABBITMQ_PASSWORD }}@${{ needs.terraform-apply.outputs.rabbitmq_ip }}:5672" \
            --namespace worker --dry-run=client -o yaml | kubectl apply -f -

      - name: Create rabbitmq-secret — worker namespace (KEDA)
        run: |
          kubectl create secret generic rabbitmq-secret \
            --from-literal=rabbit-url="amqp://admin:${{ secrets.RABBITMQ_PASSWORD }}@${{ needs.terraform-apply.outputs.rabbitmq_ip }}:5672" \
            --namespace worker --dry-run=client -o yaml | kubectl apply -f -

      - name: Create rabbitmq-secret — argo namespace (CronWorkflow)
        run: |
          kubectl create secret generic rabbitmq-secret \
            --from-literal=host="${{ needs.terraform-apply.outputs.rabbitmq_ip }}" \
            --from-literal=username="admin" \
            --from-literal=password="${{ secrets.RABBITMQ_PASSWORD }}" \
            --from-literal=rabbit-url="amqp://admin:${{ secrets.RABBITMQ_PASSWORD }}@${{ needs.terraform-apply.outputs.rabbitmq_ip }}:5672" \
            --namespace argo --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply KEDA ScaledObject
        run: |
          kubectl apply -f k8s/keda-scaledobject.yaml
          kubectl get scaledobject -n worker

      - name: Apply Argo CronWorkflow
        run: |
          kubectl apply -f argo/dlq-cronworkflow.yaml
          kubectl get cronworkflow -n argo

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 6 — Verify: ArgoCD sync + ALB targets + app health + print ALL URLs
  # ═══════════════════════════════════════════════════════════════════════════
  verify-deployment:
    name: Verify ArgoCD Sync + ALB Targets + App Health
    runs-on: ubuntu-latest
    needs: [terraform-apply, install-cluster-tools, configure-argocd, deploy-supporting-resources]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: azure/setup-kubectl@v3
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ needs.terraform-apply.outputs.eks_cluster_name }}
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd
      - name: Login to ArgoCD
        run: |
          ARGOCD_HOST=$(echo "${{ needs.install-cluster-tools.outputs.argocd_url }}" | sed 's|http://||')
          argocd login "$ARGOCD_HOST" \
            --username admin \
            --password "${{ needs.install-cluster-tools.outputs.argocd_password }}" \
            --insecure --grpc-web

      - name: Wait for ArgoCD sync — ecommerce-backend
        run: |
          ARGOCD_HOST=$(echo "${{ needs.install-cluster-tools.outputs.argocd_url }}" | sed 's|http://||')
          argocd app wait ecommerce-backend \
            --server "$ARGOCD_HOST" --insecure \
            --sync --health --timeout 300
          echo "ecommerce-backend: Synced + Healthy"

      - name: Wait for ArgoCD sync — ecommerce-worker
        run: |
          ARGOCD_HOST=$(echo "${{ needs.install-cluster-tools.outputs.argocd_url }}" | sed 's|http://||')
          argocd app wait ecommerce-worker \
            --server "$ARGOCD_HOST" --insecure \
            --sync --health --timeout 300
          echo "ecommerce-worker: Synced + Healthy"

      - name: Verify ALB target groups have registered targets
        run: |
          echo "=== Checking ALB target group health ==="
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?LoadBalancerName=='ecommerce-alb'].LoadBalancerArn" \
            --output text)
          TG_ARNS=$(aws elbv2 describe-target-groups \
            --load-balancer-arn "$ALB_ARN" \
            --query "TargetGroups[*].TargetGroupArn" \
            --output text)
          for TG_ARN in $TG_ARNS; do
            TG_NAME=$(aws elbv2 describe-target-groups \
              --target-group-arns "$TG_ARN" \
              --query "TargetGroups[0].TargetGroupName" \
              --output text)
            HEALTH=$(aws elbv2 describe-target-health \
              --target-group-arn "$TG_ARN" \
              --query "TargetHealthDescriptions[*].TargetHealth.State" \
              --output text)
            COUNT=$(aws elbv2 describe-target-health \
              --target-group-arn "$TG_ARN" \
              --query "length(TargetHealthDescriptions)" \
              --output text)
            echo "Target Group: $TG_NAME | Targets: $COUNT | States: $HEALTH"
          done

      - name: Verify all EKS resources
        run: |
          echo "=== Pods ===" && kubectl get pods -A
          echo "=== Ingress ===" && kubectl get ingress -n default
          echo "=== Services ===" && kubectl get svc -A
          echo "=== LB Controller ===" && kubectl get deployment aws-load-balancer-controller -n kube-system
          echo "=== KEDA ScaledObject ===" && kubectl get scaledobject -n worker
          echo "=== Argo CronWorkflow ===" && kubectl get cronworkflow -n argo

      - name: Health check — ecommerce app via ALB
        run: |
          ALB="${{ needs.terraform-apply.outputs.alb_dns_name }}"
          echo "Checking http://$ALB/health ..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://$ALB/health" --max-time 10 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "App is LIVE and healthy at http://$ALB"
              break
            fi
            echo "Attempt $i/18: HTTP $STATUS — waiting 10s..."
            sleep 10
          done
          [ "$STATUS" != "200" ] && kubectl describe ingress ecommerce-ingress -n default && exit 1

      - name: Get Grafana credentials from K8s secret
        run: |
          GRAFANA_USER=$(kubectl get secret prometheus-grafana -n monitoring \
            -o jsonpath="{.data.admin-user}" | base64 -d 2>/dev/null || echo "admin")
          GRAFANA_PASS=$(kubectl get secret prometheus-grafana -n monitoring \
            -o jsonpath="{.data.admin-password}" | base64 -d 2>/dev/null || echo "check-GRAFANA_PASSWORD-secret")
          GRAFANA_HOST=$(kubectl get svc prometheus-grafana -n monitoring \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "Grafana URL  : http://$GRAFANA_HOST"
          echo "Grafana User : $GRAFANA_USER"
          echo "Grafana Pass : $GRAFANA_PASS"

      - name: Print all access URLs
        run: |
          ARGO_WF=$(kubectl get svc argo-workflows-server -n argo \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          GRAFANA=$(kubectl get svc prometheus-grafana -n monitoring \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          GRAFANA_PASS=$(kubectl get secret prometheus-grafana -n monitoring \
            -o jsonpath="{.data.admin-password}" | base64 -d 2>/dev/null || echo "see-GRAFANA_PASSWORD-secret")
          echo "================================================================"
          echo " FULL DEPLOYMENT COMPLETE"
          echo "================================================================"
          echo ""
          echo " Ecommerce App (AWS ALB + WAF)"
          echo "   http://${{ needs.terraform-apply.outputs.alb_dns_name }}"
          echo ""
          echo " ArgoCD UI (AWS NLB)"
          echo "   URL      : ${{ needs.install-cluster-tools.outputs.argocd_url }}"
          echo "   Username : admin"
          echo "   Password : ${{ needs.install-cluster-tools.outputs.argocd_password }}"
          echo ""
          echo " Argo Workflows UI (AWS NLB)"
          echo "   http://$ARGO_WF"
          echo ""
          echo " Grafana (AWS NLB)"
          echo "   URL      : http://$GRAFANA"
          echo "   Username : admin"
          echo "   Password : $GRAFANA_PASS"
          echo ""
          echo " RabbitMQ Management UI (EC2 public IP)"
          echo "   http://${{ needs.terraform-apply.outputs.rabbitmq_public_ip }}:15672"
          echo "   Username : admin"
          echo "   Password : (value of RABBITMQ_PASSWORD GitHub secret)"
          echo ""
          echo "================================================================"
          echo " GitOps active: push to main -> ArgoCD auto-deploys to EKS"
          echo " Repo: https://github.com/parthorookie/ecommercethreetierevent1edited"
          echo "================================================================"